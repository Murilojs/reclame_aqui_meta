<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Avaliações</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f2f2f;
    }

    #loginScreen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .login-box input {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #0b5cff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #app {
      display: none;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      color: white;
    }

    .top-bar button {
      background: #ff4d4f;
      border: none;
      padding: 8px 12px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <h2 style="text-align:center;">Login</h2>

      <input id="email" type="email" placeholder="Email">
      <input id="senha" type="password" placeholder="Senha">

      <button onclick="fazerLogin()">Entrar</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app">

    <!-- HEADER -->
    <div class="top-bar">
      <div>👤 <span id="userEmail"></span></div>
      <button onclick="logout()">Sair</button>
    </div>

    <!-- DASHBOARD ORIGINAL -->
    <div class="page-shell">

      <header class="hero">
        <div class="hero__content">
          <h1>DASHBOARD DE AVALIAÇÕES POSITIVAS</h1>
        </div>

        <div class="hero__metrics">
          <div>
            Nota esperada: <strong id="expectedScoreDisplay">0</strong>
          </div>
          <div>
            Projeção atual: <strong id="projectionCurrentHeader">0</strong>
          </div>
        </div>
      </header>

      <main class="dashboard">

        <section>
          <h2>Resumo</h2>
          <p>Avaliações: <strong id="positiveCount">0</strong></p>
          <p>Cobertura: <strong id="coveragePercent">0%</strong></p>
          <p>Meta diária: <strong id="dailyStatus">0</strong></p>
        </section>

        <section>
          <h2>Avaliações</h2>
          <div id="evaluationGrid"></div>
        </section>

        <section>
          <h2>Configurações</h2>

          <input id="expectedScore" type="number" step="0.1">
          <input id="projectionCurrent" type="number" step="0.1">
          <input id="dailyGoal" type="number">
          <input id="totalExpected" type="number">
          <input id="previousEvaluations" type="number">

        </section>

      </main>

    </div>

  </div>

  <div id="statusMessage"></div>

  <script type="module" src="script.js"></script>

</body>
</html>
